<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRGT School Management | Global Standards</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; }
        header { background: #2c3e50; color: white; padding: 40px 20px; text-align: center; border-bottom: 5px solid #ff9933; }
        .container { max-width: 800px; margin: 30px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { margin: 0; font-size: 2.5rem; }
        h2 { color: #ff9933; margin-top: 5px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #2c3e50; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .submit-btn { background-color: #ff9933; color: white; width: 100%; padding: 15px; border: none; border-radius: 6px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .submit-btn:hover { background-color: #e68a00; }
        .details { text-align: center; margin-top: 30px; font-size: 0.9rem; color: #666; }
        footer { text-align: center; padding: 20px; color: #999; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1>SRGT School Management</h1>
    <h2>Global Standards, Indian Values</h2>
    <p>Jai Shree Ram</p>
</header>

<div class="container">
    <h3 style="text-align: center; color: #2c3e50;">Request a School Demo</h3>
    
    <form action="https://webto.salesforce.com/bin/servlet/bin/WebToLead?encoding=UTF-8" method="POST">
        
        <input type="hidden" name="oid" value="00Df600000HbN3tAAA">
        
        <input type="hidden" name="retURL" value="https://dheerajgour11-eng.github.io/shreeram.github.io/">

        <div class="form-group">
            <label for="first_name">First Name</label>
            <input id="first_name" name="first_name" type="text" placeholder="Your Name" required>
        </div>

        <div class="form-group">
            <label for="last_name">Last Name</label>
            <input id="last_name" name="last_name" type="text" placeholder="Surname" required>
        </div>

        <div class="form-group">
            <label for="company">School Name</label>
            <input id="company" name="company" type="text" placeholder="e.g., Adarsh Vidhya Mandir" required>
        </div>

        <div class="form-group">
            <label for="phone">Mobile Number</label>
            <input id="phone" name="phone" type="tel" placeholder="+91 XXXX-XXXXXX" required>
        </div>

        <div class="form-group">
            <label for="city">City / Town</label>
            <input id="city" name="city" type="text" placeholder="e.g., Nawa City">
        </div>

        <button type="submit" name="submit" class="submit-btn">Register for Demo</button>
    </form>
</div>

<div class="details">
    <p><strong>Shree Raj Govind Technologies Private Limited</strong></p>
    <p>Director: Dheeraj Gour | Startup ID: 5F7AB09</p>
    <p>Nawa City, Nagaur, Rajasthan</p>
</div>

<footer>
    &copy; 2026 SRGT School Management. All Rights Reserved.
</footer>

</body>
</html>
